# hello — the day-0 pipeline. Plans AND runs offline, with zero auth, using only
# run: steps and one gate. `cairn run hello` works the moment the workspace
# exists. Grow it by uncommenting the agent: step at the bottom.
# Reference: docs/API.md §2.

pipeline: hello
version: 1

params:
  name: { type: string, default: world }   # cairn run hello --param name=Ada

run_id: "hello-{params.name}-{date}"        # e.g. hello-world-20260703 (+ auto -v2 on collision)

artifacts:
  greeting:
    path: greeting.json                     # run-dir-relative; {artifact:greeting} → its absolute path
    schema: schemas/greeting.json
  message:
    path: message.txt
    validator: validators/nonempty.py       # exists + non-empty check (validator argv: run_dir, name, path)

steps:
  # 1. run: — deterministic, no model, no auth. Writes the greeting artifact.
  #    {params.name}/{pipeline} are VALUE placeholders; {artifact:greeting} is a
  #    REFERENCE placeholder resolving to the artifact's absolute path (§2.8).
  - id: greet
    run: >-
      python3 -c "import json, sys;
      json.dump({'name': sys.argv[1], 'pipeline': sys.argv[2]}, open(sys.argv[3], 'w'))"
      "{params.name}" "{pipeline}" "{artifact:greeting}"
    produces: [greeting]

  # 2. gate: — a human decision point. Headless runs resolve to `default`;
  #    a run can also pin it with `cairn run hello --gate tone=formal`.
  - gate: tone
    reads: [greeting]
    ask: "What tone should the message use?"
    options:
      friendly: "Warm and casual"
      formal:   "Polished and professional"
    default: friendly

  # 3. run: — consumes the gate choice ({gate:tone}), the first artifact
  #    ({artifact:greeting}), and writes the message artifact.
  - id: compose
    run: >-
      python3 -c "import json;
      g = json.load(open('{artifact:greeting}'));
      msg = '{gate:tone}'.capitalize() + ' hello, ' + g['name'] + '!';
      open('{artifact:message}', 'w').write(msg + chr(10))"
    needs: [greeting, tone]
    produces: [message]

  # ── Your first upgrade: a step that needs judgment becomes an agent: step ────
  # When the right command isn't something you can spell out, delegate to a model.
  # cairn.toml already ships [executors.claude] enabled (with tiers), so to enable:
  # declare the `elaborated` artifact above (with a schema or validator), then
  # uncomment this node. `cairn plan hello` typechecks it — dataflow, agent,
  # skills — before any run.
  #
  # - id: elaborate
  #   agent: assistant               # → agents/assistant.yaml (tier + skills + tools)
  #   args: { tone: "{gate:tone}" }  # exposed to the agent envelope as {{args.tone}}
  #   needs: [message]
  #   produces: [elaborated]
