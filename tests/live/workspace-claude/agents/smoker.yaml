description: "Smoke agent — writes one tiny typed report so the live claude executor can be verified end-to-end."

tier: cheap             # → haiku in cairn.toml; keeps live token cost minimal
effort: low             # exercises the executor's `--effort` argv path on the real CLI

skills: []

tools:
  allow: [read, write]  # the agent only needs to write its one report artifact
  network: false

env: []

returns: schemas/step-return.json
